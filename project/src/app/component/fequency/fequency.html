<app-navbar></app-navbar>

<div class="w-screen h-screen flex flex-col py-10 px-6 gap-4 overflow-y-auto">

  <!-- Stepper -->
  <div class="flex items-center justify-center space-x-4 mb-6" id="stepper">
    <div *ngFor="let step of [1,2,3,4]" 
          [ngClass]="step <= currentStep ? 'bg-blue-500' : 'bg-[#00000040]'"
         class="step w-10 h-10 flex items-center justify-center rounded-full text-white font-[800]">
      {{step}}
    </div>
  </div>

  <!-- Page Title -->
  <div class="place-content-center mt-[10px]">
    <h4 class="font-extrabold text-xl text-center">Frequency</h4>
    <p class="text-center font-extrabold text-xs">How often would you like to donate</p>
  </div>

  <!-- Frequency Tiles -->
  <div class="grid grid-cols-2 py-[25px] gap-[20px]">
    <div *ngFor="let tile of frequencyTiles"
         (click)="selectFrequency(tile.value)"
         [ngClass]="selectedFrequency === tile.value ? 'border-2 border-blue-500' : 'border border-gray-300'"
         class="grid bg-white h-[161px] w-full place-content-center rounded-xl cursor-pointer hover:shadow-lg transition-shadow">
      
      <div class="grid place-content-center gap-4 p-4">
        <div class="grid place-content-center">
          <img class="w-[45px] h-[45px]" [src]="tile.icon" alt="{{tile.title}}"/>
        </div>
        <div>
          <h4 class="text-center text-xs font-extrabold text-[#000000]">{{tile.title}}</h4>
          <p class="text-center text-[10px] font-normal text-[#000000] tracking-tighter">{{tile.description}}</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Next / Back Buttons -->
  <div class="flex flex-row gap-10 mt-6 mb-10">
   
      <button type="button" class="w-45 py-2.5 px-5 me-2 mb-2 text-sm font-medium text-gray-900 flex items-center gap-2 justify-center focus:outline-none bg-gray-200 rounded-lg border border-gray-200 hover:bg-gray-100 hover:text-blue-700 focus:z-10 focus:ring-4 focus:ring-gray-100" (click)="goBack()"> 
                    <img width="20" height="17" src="https://img.icons8.com/ios/50/back--v1.png" alt="back icon"/> Back 
                    </button>
    


       <button
                    type="button"
                    id="nextBtn"
                    (click)="goNext()" 
                    class="w-45 py-2.5 px-5 me-2 mb-2 text-sm font-medium text-gray-900 flex items-center gap-2 justify-center focus:outline-none bg-[#5B8E7D] rounded-lg border border-gray-200 hover:bg-gray-100 hover:text-blue-700 focus:z-10 focus:ring-4 focus:ring-gray-100"
                    > 
                    Next <img width="20" height="17" src="https://img.icons8.com/?size=100&id=61&format=png&color=000000" alt="next icon"/>
                    </button>
    
  </div>

  <!-- Debug: shows selected frequency -->
  <p class="text-center text-sm font-bold">Selected: {{ selectedFrequency }}</p>
</div>

<app-footer></app-footer>
