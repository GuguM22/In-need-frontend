<app-navbar></app-navbar>

<div class="w-screen h-screen flex flex-col py-10 px-6 gap-4 overflow-y-auto">

  <!-- Stepper -->
  <div class="flex items-center justify-center space-x-4 mb-6" id="stepper">
    <div class="step w-10 h-10 flex items-center justify-center rounded-full bg-[#00000040] text-white font-[800]">1</div>
    <div class="step w-10 h-10 flex items-center justify-center rounded-full bg-[#00000040] text-white font-[800]">2</div>
    <div class="step w-10 h-10 flex items-center justify-center rounded-full bg-blue-500 text-white font-[800]">3</div>
    <div class="step w-10 h-10 flex items-center justify-center rounded-full bg-[#00000040] text-white font-[800]">4</div>
  </div>

  <!-- Page Title -->
  <div class="place-content-center mt-[10px]">
    <h4 class="font-extrabold text-xl text-center">Frequency</h4>
    <p class="text-center font-extrabold text-xs">How often would you like to donate</p>
  </div>

  <!-- Frequency Tiles -->
  <div class="grid grid-cols-2 py-[25px] gap-[20px]">
    <div *ngFor="let tile of frequencyTiles"
         (click)="selectedFrequency = tile.value"
         [ngClass]="selectedFrequency === tile.value ? 'border-2 border-blue-500' : 'border border-gray-300'"
         class="grid bg-white h-[161px] w-full place-content-center rounded-xl cursor-pointer hover:shadow-lg transition-shadow">
      
      <div class="grid place-content-center gap-4 p-4">
        <div class="grid place-content-center">
          <img class="w-[45px] h-[45px]" [src]="tile.icon" alt="{{tile.title}}"/>
        </div>
        <div>
          <h4 class="text-center text-xs font-extrabold text-[#000000]">{{tile.title}}</h4>
          <p class="text-center text-[10px] font-normal text-[#000000] tracking-tighter">{{tile.description}}</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Next / Back Buttons -->
  <div class="flex h flex-row gap-2 mt-6 mb-10">
    <div class="w-full h-[46px] bg-[#D9D9D9] grid place-content-center rounded-lg">
      <button class="flex flex-row justify-between items-center w-full h-full px-4" (click)="goBack()">
        <img src="icons/lessthan.svg" alt="back" class="w-5 h-5"/>
        <span>Back</span>
      </button>
    </div>

    <div class="w-full h-[46px] grid place-content-center rounded-lg bg-[#5B8E7D]">
      <button class="flex flex-row justify-between items-center w-full h-full px-4 text-white" (click)="goNext()">
        <span>Next</span>
        <img src="icons/greaterthan.svg" alt="next" class="w-5 h-5"/>
      </button>
    </div>
  </div>
  <!-- Debug: shows selected frequency -->
  <p class="s text-center text-sm font-bold">Selected: {{ selectedFrequency }}</p>
</div>

<app-footer></app-footer>
