<app-navbar></app-navbar>

<div class="w-screen h-screen flex flex-col pt-[94px] pb-24 lg:px-[200px] lg:p-0 px-2 gap-4 overflow-y-auto">

  <!-- Stepper -->
  <div class="flex items-center justify-center space-x-4 mb-6" id="stepper">
    <div *ngFor="let step of [1,2,3,4]" 
          [ngClass]="step <= currentStep ? 'bg-blue-500' : 'bg-[#00000040]'"
         class="step w-10 h-10 flex items-center justify-center rounded-full text-white font-[800]">
      {{step}}
    </div>
  </div>

  <!-- Page Title -->
  <div class="place-content-center">
    <h4 class="font-extrabold text-[20px] text-center">Frequency</h4>
    <p class="text-center font-[700] text-[#0000009C] text-[14px]">How often would you like to donate</p>
  </div>

  <div class="border border-gray-300 rounded-lg shadow-xl px-4 py-6 bg-white">
  <!-- Frequency Tiles -->
  <div class="place-content-center">
    <h4 class="font-extrabold text-[20px] mb-4 text-center">Select donation frequency</h4>
  </div>
  <div class="grid grid-cols-2 gap-4">
    <div *ngFor="let tile of frequencyTiles"
         (click)="selectFrequency(tile.value)"
         [ngClass]="selectedFrequency === tile.value ? 'border-2 border-blue-500' : 'border border-gray-300'"
         class="grid bg-white h-[161px] w-full place-content-center rounded-xl cursor-pointer hover:shadow-lg transition-shadow">
      
      <div class="grid place-content-center gap-4 p-4">
        <div class="grid place-content-center">
          <img class="w-[45px] h-[45px]" [src]="tile.icon" alt="{{tile.title}}"/>
        </div>
        <div>
          <h4 class="text-center text-xs font-extrabold text-[#000000]">{{tile.title}}</h4>
          <p class="text-center text-[10px] font-normal text-[#000000] tracking-tighter">{{tile.description}}</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Next / Back Buttons -->
  <div class="flex flex-row gap-4 mt-6">
    <div class="w-full h-[46px] bg-[#D9D9D9] grid place-content-center rounded-lg">
      <button class="flex flex-row justify-between items-center w-full h-full px-4" (click)="goBack()">
         &lt; Back
      </button>
    </div>

    <div class="w-full l h-[46px] grid place-content-center rounded-lg bg-[#5B8E7D]">
      <button class="flex flex-row justify-between items-center w-full h-full px-4 text-white" (click)="goNext()">
        Next &gt;
      </button>
    </div>
  </div>
  </div>

  <!-- Debug: shows selected frequency -->
  <!-- <p class="text-center text-sm font-bold">Selected: {{ selectedFrequency }}</p> -->
</div>

<app-footer></app-footer>
