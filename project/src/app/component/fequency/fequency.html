    <div class="flex items-center justify-center space-x-4 mb-6" id="stepper">
        <div
          class="step w-10 h-10 flex items-center justify-center rounded-full bg-blue-500 text-white font-[800]"
        >
          1
        </div>
        <div
          class="step w-10 h-10 flex items-center justify-center rounded-full bg-blue-500 text-white font-[800]"
        >
          2
        </div>
        <div
          class="step w-10 h-10 flex items-center justify-center rounded-full bg-blue-500 text-[#FFFFFF] font-[800]"
        >
          3
        </div>
        <div
          class="step w-10 h-10 flex items-center justify-center rounded-full bg-[#00000040] text-white font-[800]"
        >
          4
        </div>
      </div>
    <div class="place-content-center  mt-[10px]">
        <h4 class="font-extrabold text-xl text-center">Frequency</h4>
        <p class="text-center font-extrabold text-xs">How often would you like to donate</p>
    </div>
    <div class="grid grid-cols-2 py-[25px] gap-[20px]  ">
        <div *ngFor="let tile of frequencyTiles" class="grid bg-[#FFFFFF] h-[161px] w-full place-content-center border border-[#00000030] text-[#FFFFFF] rounded-xl">
            <div class="grid place-content-center gap-4 p-4">
                <div class="grid place-content-center">
                    <img class="w-[45px] h-[45px]" [src]="tile.icon">
                </div>
                <div>
                    <h4 class="text-center text-xs font-extrabold text-[#000000] ">{{tile.title}}</h4>
                    <p class="text-center font-normal text-[#000000] text-[10px] tracking-tighter ">{{tile.description}}</p>
                </div>
            </div>
        </div>
    </div>
    <div class="flex flex-row gap-2">
        <div class="w-full h-[46px] bg-[#D9D9D9] grid place-content-center rounded-lg">
            <button class="flex flex-row justify-between"><img src="icons/lessthan.svg"/>Back
                 
            </button>
        </div>
        <div class="w-full h-[46px]  grid place-content-center rounded-lg bg-[#5B8E7D]">
           
            <button class="text-[#FFFFFF] flex flex-row justify-between">Next 
                <img src="icons/greaterthan.svg"/>
            </button>
        </div>
    </div>
    <div>

    </div>
</div>
