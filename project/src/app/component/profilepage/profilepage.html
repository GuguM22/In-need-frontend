<app-navbar></app-navbar>
<div class="w-screen h-screen flex flex-col py-10 px-6 gap-4 bg-[#f5f5f5]">
  
    <div>
        <button class="flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
            <span class="text-[#000000] font-extrabold text-lg">Back</span>
        </button>
    </div>

 
    <div class="relative h-[280px]">
        <div class="absolute inset-0 bg-cover bg-center z-0 border-sky-900 " style="background-image: url('https://images.unsplash.com/photo-1509099836639-18ba1795216d');"></div>
        <div class="h-[180px] rounded-xl overflow-hidden">
            <div class="h-full flex flex-col justify-end p-6 text-white">
                <div class="absolute top-4 right-4 bg-[#4CAF50] px-3 py-1 rounded-full text-xs font-bold">
                    IN NEED
                </div>
                
                <div class="absolute -bottom-12 left-6 z-30">
                    <img src="Letsdoit!.jpeg" 
                        class="w-[100px] h-[100px] rounded-full border-4 border-white object-cover shadow-lg">
                </div>
                
                <div>
                    <h1 class="font-extrabold text-2xl mb-1">Hopewell Mthunzi</h1>
                    <p class="text-sm opacity-90 mb-3 ">Helping since 2020</p>
                    <div class="flex gap-3">
                        <div class="bg-white bg-opacity-20 px-3 py-1 rounded text-xs">
                            $1,240 donated
                        </div>
                        <div class="bg-white bg-opacity-20 px-3 py-1 rounded text-xs">
                            12 causes
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <div class="mt-16 flex-1 flex flex-col">
        <div class="p-4 bg-white rounded-xl shadow-md max-w-md mx-auto">
            <div class="flex items-center gap-4 mb-4">
                <div>
                    <h2 class="text-xl font-bold text-gray-800">{{ name }}</h2>
                    <p class="text-gray-500 text-sm">{{ email }} / {{ phone }}</p>
                </div>
            </div>

            <div class="mb-4">
                <h3 class="text-md font-semibold text-gray-700">Short Bio / Story</h3>
                <p class="text-gray-600 text-sm">{{ bio }}</p>
            </div>

            <div class="mb-4">
                <h3 class="text-md font-semibold text-gray-700">Location</h3>
                <p class="text-gray-600 text-sm">{{ Location }}</p>
            </div>
        </div>
    </div>

    <div class="flex justify-end">
        <button class="bg-[#4CAF50] text-white px-4 py-2 rounded-lg hover:bg-blue-700 text-sm">
            Edit Profile
        </button>
    </div>
</div>






<app-footer></app-footer>
