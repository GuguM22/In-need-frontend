  <div class="relative w-full">
    <div class="h-[180px] rounded-xl overflow-hidden">
      <div class="absolute inset-0 bg-cover bg-center" style="
          background-image: url('https://images.unsplash.com/photo-1509099836639-18ba1795216d');
        "></div>
    </div>
    <!-- Badge -->
    <div class="absolute top-2 right-2 bg-[#5B8E7D] text-white px-2 py-0.5 rounded-full text-xs font-bold z-none">
      IN NEED
    </div>
    <!-- Profile Image -->
    <div class="absolute left-4 -bottom-10 z-20">
      <img [src]="profileImageUrl || 'logo.png'"

        (click)="fileInput.click()" style="cursor: pointer" />
    </div>

    <input type="file" (change)="onFileSelected($event)" #fileInput class="hidden" accept="image/*" />
  </div>

        {{ capitalizeWords(name) }}
      </h1>
      <h1 *ngIf="!isEditing" class="font-extrabold text-xl mb-0.5"></h1>
      <input *ngIf="isEditing" [(ngModel)]="editName" class="border-1 border-[#00000030] p-1 rounded text-gray font-[400]  w-full mb-1" />
      <div class="flex items-center justify-between gap-2">

      </div>

        <div class="flex-shrink-0">
          <div

            {{ name.charAt(0) }}
          </div>
        </div>
        <div>

            {{ capitalizeWords(name) }}
          </h2>

        <div class="flex items-end justify-between gap-[0.5px]">
          <p *ngIf="!isEditing" class="text-gray-600 text-xs mt-0.5 flex items-end gap-1">
            <span>{{ capitalizeWords(email) }}</span> &bull;
            <span>{{ phone }}</span> &bull;
        
            <span class="px-1 py-0.4 text-[9px] font-medium rounded flex items-center" [ngClass]="{
                    'bg-[#F7CB73] text-gray-600 border-[#F7CB73]': statusText === 'Pending',
                    'bg-[#c82027] text-white border-[#c82027]': statusText === 'Rejected',
                    'bg-[#5B8E7D] text-white border-[#5B8E7D]': statusText === 'Accepted',
                    'bg-[#F4D0D1] text-white border-gray-200': statusText === 'Not Verified'
                  }">
              {{ statusText.toUpperCase() }}
            </span>
          </p>
        </div>

          <div *ngIf="isEditing" class="flex flex-col gap-1">
            <input [(ngModel)]="editEmail" class="w-70 h-8 border-1 border-[#00000030] p-1 rounded text-gray font-[400] text-xs" placeholder="Email"

            <input [(ngModel)]="editPhone" *ngIf="!isSponsor && phone !== 'Not verified yet'"
              class="w-70 h-8 border p-1 rounded text-black w-full text-xs" placeholder="Phone" />
          </div>
        </div>
      </div>

        <p *ngIf="!isEditing" class="text-gray-700 text-sm leading-relaxed tracking-wide">
          {{ bio }}
        </p>
        <textarea *ngIf="isEditing" [(ngModel)]="editBio"
          class="border-1 border-[#00000030] resize-none h-30 p-1 rounded text-gray font-[400] w-full text-sm"></textarea>
      </div>

              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 22s8-4.5 8-10a8 8 0 10-16 0c32 5.5 8 10 8 pathogenicity 8 10z" />

                d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </div>
          <h3 class="text-sm font-semibold text-gray-700">Location</h3>
        </div>
        <div *ngIf="!isEditing" class="bg-white p-2 rounded-lg shadow-sm flex flex-col gap-1">
          <span class="text-gray-800 text-xs font-medium">{{ capitalizeWords(Location) }}</span>
        </div>
        <input *ngIf="isEditing" [(ngModel)]="editLocation"
          class=" h-8 border-1 border-[#00000030]  p-1 rounded text-gray font-[400]  w-full text-xs" />
      </div>

      <!-- Edit Button -->
      <div class="flex justify-center mt-4">
        <button (click)="toggleEdit()"
          class="bg-[#5B8E7D] text-white px-6 py-3 rounded-lg shadow-md text-sm font-semibold w-full max-w-md">
          {{ isEditing ? 'Save Changes' : 'Edit Profile' }}
        </button>
      </div>

      <!-- View / Edit Documents -->
      <div class="mt-6 flex flex-col gap-2">
        <!---- <h3 class="text-lg font-bold text-green-700 mb-2">Documents</h3>
        <div class="flex flex-col gap-2">
          <-- CIPC Registration --
          <div class="flex items-center justify-between gap-2">
            <button
              *ngIf="!isEditing"
              (click)="viewDocument('cipc')"
              class="text-left border p-2 rounded-lg shadow-sm bg-white hover:bg-green-50 text-gray-800 font-medium flex-1"
            >
              CIPC Registration
            </button>
            <div *ngIf="isEditing" class="flex gap-2 flex-1">
              <button
                (click)="viewDocument('cipc')"
                class="flex-1 text-left border p-2 rounded-lg shadow-sm bg-white hover:bg-green-50 text-gray-800 font-medium"
              >
                CIPC Registration
              </button>
              <input
                type="file"
                (change)="updateDocument($event, 'cipc')"
                class="border p-1 rounded text-sm text-gray-700 w-32"
              />
            </div>
          </div>

          <-- Founder Identification --

            </button>
            <div *ngIf="isEditing" class="flex gap-2 flex-1">
              <button

              </button>
              <input

              />

          </div>
        </div>
      </div>-->
      </div>
    </div>
  
   </div>
</div>
<app-footer></app-footer>

}
