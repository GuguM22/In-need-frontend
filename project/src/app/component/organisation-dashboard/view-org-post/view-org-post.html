<div *ngIf="request" class="container">
  <div class="event-info">
    <div class="urgency-wrapper">
      <div>Urgency</div>
      <div class="event-title">{{ request.priority }}</div>
    </div>
    <div class="event-date">Date: {{ request.requiredDate }}</div>  
  </div>

  <div class="content">
    <h2>{{ request.title }}</h2>
    
    <p>{{ request.description }}</p>

    <button class="donate-btn" [routerLink]="['/options', request.id]">Donate</button>

</div>
