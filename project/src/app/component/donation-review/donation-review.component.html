<!-- Navbar -->
<app-navbar></app-navbar>

<!-- Main Content -->
<div class="w-screen h-screen flex flex-col py-10 px-6 gap-4 overflow-y-auto">

  <!-- Stepper -->
  <div class="flex items-center justify-center space-x-4 mb-6" id="stepper">
    <div class="step w-10 h-10 flex items-center justify-center rounded-full bg-[#00000040] text-white font-[800]">1</div>
    <div class="step w-10 h-10 flex items-center justify-center rounded-full bg-[#00000040] text-white font-[800]">2</div>
    <div class="step w-10 h-10 flex items-center justify-center rounded-full bg-[#00000040] text-white font-[800]">3</div>
    <div class="step w-10 h-10 flex items-center justify-center rounded-full  bg-blue-500 text-white font-[800]">4</div>
  </div>

  <!-- Page Title -->
  <div class="place-content-center mt-[10px]">
    <h4 class="font-extrabold text-xl text-center">Review Donation</h4>
    <p class="text-center text-xs text-gray-500">Check your donation details before confirming</p>
  </div>

  <!-- Selected Frequency Display -->
  <div class="max-w-sm mx-auto bg-white p-6 rounded-lg border border-gray-300 mt-6 text-center">
    <h5 class="font-bold text-gray-700 mb-2">Selected Frequency</h5>
    <p class="text-gray-800 text-lg">{{ selectedFrequency | titlecase }}</p>
  </div>

  <!-- Navigation Buttons -->
  <div class="flex h flex-row gap-2 mt-10">
    <!-- Back Button -->
    <div class="w-full h-[46px] bg-[#D9D9D9] grid place-content-center rounded-lg">
      <button 
        class="flex flex-row justify-between items-center w-full h-full px-4 "
        (click)="goBack()"
      >
        <img (click)="goBack()" src="icons/lessthan.svg" alt="back" class="w-10 h-10 "/>
        <span>Back</span>
      </button>
    </div>
    <div class="w-full h-[46px] grid place-content-center rounded-lg bg-[#5B8E7D]">
      <button 
        class="flex flex-row justify-between items-center w-full h-full px-4 text-white"
        (click)="confirmDonation()"
      >
        <span>Confirm</span>
        <img src="icons/check.svg" alt="confirm" class="w-5 h-5"/>
      </button>
    </div>
  </div>
</div>

<!-- Footer Navigation -->
<div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 flex-shrink-0 z-30">
  <div class="grid grid-cols-4 max-w-lg mx-auto font-medium py-4">
    <a [routerLink]="'/home'" class="inline-flex flex-col items-center justify-center px-5 group">
      <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 50 50" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
        <path d="M25 3 L44 18 L44 45 L32 45 L32 26 L18 26 L18 45 L6 45 L6 18 L25 3 Z"></path>
      </svg>
      <span class="text-sm text-gray-500 group-hover:text-green-600">Home</span>
    </a>
    <a [routerLink]="'/view'" class="inline-flex flex-col items-center justify-center px-5 group">
      <img width="30" height="30" src="https://img.icons8.com/ios/50/view-file.png" alt="view-file"/>
      <span class="text-sm text-gray-500 group-hover:text-green-600">Views</span>
    </a>
    <a [routerLink]="'/donation'" class="inline-flex flex-col items-center justify-center px-5 group">
      <img width="30" height="30" src="https://img.icons8.com/ios/50/donate.png" alt="donate"/>
      <span class="text-sm text-gray-500 group-hover:text-green-600">Donation</span>
    </a>
    <a [routerLink]="'/profile'" class="inline-flex flex-col items-center justify-center px-5 group">
      <img width="30" height="30" src="https://img.icons8.com/ios/50/user-male-circle--v1.png" alt="profile"/>
      <span class="text-sm text-green-700 font-semibold">Profile</span>
    </a>
  </div>
</div>
<app-footer></app-footer>
