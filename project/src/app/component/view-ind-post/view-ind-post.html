
  
  <div *ngIf="!individual">
    <p>Loading post...</p>
  </div>
  

  <div *ngIf="individual" class="container">

  <div class="event-info">
    <div class="urgency-wrapper">
      <div>Urgency</div>
      <div class="event-title">{{ individual.urgency }}</div>
    </div>
    <div class="event-date">Date: {{ individual.neededByDate }}</div>  
  </div>

  <div class="content">
    <h2>{{ individual.title }}</h2>
    
    <p>{{ individual.description }}</p>

    <button class="donate-btn" [routerLink]="['/options', individual.id]">Donate</button>
