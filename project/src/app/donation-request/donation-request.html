<body class="h-screen overflow-y-auto bg-gray-100">
    <div> 
        <div class="flex items-center justify-center space-x-9 mt-8" id="stepper">
            <div class="step w-11 h-11 flex items-center justify-center rounded-full bg-blue-500 text-white text-sm">1</div> 
            <div class="step w-11 h-11 flex items-center justify-center rounded-full bg-blue-500 text-white text-sm">2</div> 
            <div class="step w-11 h-11 flex items-center justify-center rounded-full bg-gray-200 text-gray-500 text-sm">3</div> 
            <div class="step w-11 h-11 flex items-center justify-center rounded-full bg-gray-200 text-gray-500 text-sm">4</div> 
        </div>

        <div class="w-full max-w-sm relative mb-2">
            <div class="absolute -left-3 -top-10 flex items-center space-x-2">
                <svg fill="#000000" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    width="24" height="24" viewBox="0 0 512 512" id="Layer_1" version="1.1" xml:space="preserve"
                    xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
                    <path
                        d="M50.2,169.6C97.9,56.3,228.5,3.1,341.8,50.9s166.4,178.3,118.7,291.6S282.2,508.9,168.9,461.1  C86.4,426.4,32.7,345.5,32.7,256C32.7,226.3,38.6,196.9,50.2,169.6z M254.7,448c106,0,192-86,192-192s-86-192-192-192  s-192,86-192,192S148.7,448,254.7,448z M226.7,140.7L111.4,256l115.3,115.3l21.2-21.2L168.7,271h208.2v-30H168.7l79.1-79.1  L226.7,140.7z">
                    </path>
                </svg>
                <button type="button" class="text-sm -left-py-3 text-black focus:outline-none" (click)="goBack()">
                    Back
                </button>
            </div>
        </div>

        <div class="text-gray-800 text-base font-bold mt-12 text-center">Details</div> 
        <div class="text-gray-500 text-sm font-medium text-center mt-1">Tell us about your donation</div>

        <div class="mt-4 max-w-sm mx-auto p-6 bg-white border border-gray-300 rounded-lg"> 
            <div class="text-gray-800 text-base font-bold mt-1 mb-5 text-center">Donation Type</div>
            <form class="max-w-sm mx-auto border-gray-300">
                
                <div class="mb-4 text-gray-500"> 
                    <label for="description" class="block mb-2 text-sm font-medium">
                        Description: <span class="text-gray-500">*</span>
                    </label> 
                    <input type="text" id="description" name="description" class="bg-gray-50 border border-gray-400 text-gray-700 text-sm rounded-lg w-full p-2.5 focus:ring-blue-500 focus:border-blue-500" required /> 
                </div>

                <!-- Quantity Input with Angular-style validation -->
                <div class="form-group mb-4">
                    <label for="quantity" class="form-label block mb-2 text-sm font-medium text-gray-500">
                        Quantity: <span class="text-gray-500">*</span>
                    </label>
                    <div class="number-input-wrapper">
                        <input 
                            type="number" 
                            id="quantity" 
                            formControlName="quantity" 
                            class="form-input number-input bg-gray-50 border border-gray-400 text-gray-700 text-sm rounded-lg w-full p-2.5 focus:ring-blue-500 focus:border-blue-500" 
                            min="1"
                            [class.error]="sponsorshipForm.get('quantity')?.invalid && sponsorshipForm.get('quantity')?.touched">
                    </div>
                    <div class="error-message text-red-500 text-xs mt-1" 
                         *ngIf="sponsorshipForm.get('quantity')?.hasError('min') && sponsorshipForm.get('quantity')?.touched">
                        Quantity must be at least 1.
                    </div>
                </div>

                <!-- Date Input with Angular-style validation (as per your request) -->
                <div class="form-group mb-4">
                    <label for="requiredDate" class="form-label block mb-2 text-sm font-medium text-gray-500">
                        Required By Date: <span class="text-gray-500">*</span>
                    </label>
                    <input 
                        type="date" 
                        id="requiredDate" 
                        formControlName="requiredDate" 
                        class="form-input date-input bg-gray-50 border border-gray-400 text-gray-700 text-sm rounded-lg w-full p-2.5 focus:ring-blue-500 focus:border-blue-500"
                        [class.error]="sponsorshipForm.get('requiredDate')?.invalid && sponsorshipForm.get('requiredDate')?.touched"
                        style="color: text-gray-700;">
                    <div class="error-message text-red-500 text-xs mt-1" 
                         *ngIf="sponsorshipForm.get('requiredDate')?.hasError('pastDate') && sponsorshipForm.get('requiredDate')?.touched">
                        Date cannot be in the past.
                    </div>
                </div>

                <div class="mb-4 text-gray-500"> 
                    <div class="mb-4 text-gray-500 justify-center"> 
                        <label class="block mb-2 text-sm font-medium">
                            Logistic Preference: <span class="text-grey-500">*</span>
                        </label> 
                        <div class="flex flex-wrap gap-4 justify-center">
                            <label class="relative cursor-pointer"> 
                                <input type="radio" name="logistics" value="delivery" class="peer hidden" required /> 
                                <div class="w-[125px] h-[85px] bg-white border border-gray-400 peer-checked:border-[#5B8E7D] rounded-lg flex flex-col items-center justify-center"> 
                                    <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="text-gray-500"> 
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17h6M9 13h6M4 17h1a1 1 0 001-1V6a1 1 0 011-1h10a1 1 0 011 1v3h2l3 4v5a1 1 0 01-1 1h-1M4 17a2 2 0 104 0 2 2 0 00-4 0zm13 0a2 2 0 104 0 2 2 0 00-4 0z" /> 
                                    </svg> 
                                    <span class="text-sm text-gray-500 mt-1">Delivery</span> 
                                </div> 
                            </label>
                            <label class="relative cursor-pointer"> 
                                <input type="radio" name="logistics" value="pickup" class="peer hidden" required /> 
                                <div class="w-[125px] h-[85px] bg-white border border-gray-400 peer-checked:border-[#5B8E7D] rounded-lg flex flex-col items-center justify-center"> 
                                    <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="text-gray-500"> 
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                                    </svg> 
                                    <span class="text-sm text-gray-500 mt-1">Pick-up</span> 
                                </div> 
                            </label>
                        </div>
                    </div>
                </div>

                <div class="form-group mb-4 text-gray-500">
                    <label for="notes" class="block mb-2 text-sm font-medium">Editional Notes</label>
                    <textarea 
                        id="notes" 
                        name="notes" 
                        class="bg-gray-50 border border-gray-400 text-gray-700 text-sm rounded-lg w-full p-2.5 focus:ring-blue-500 focus:border-blue-500" 
                        rows="1">
                    </textarea>
                </div>

                        <div class="flex flex-wrap gap-4 justify-center"> 
                    <button type="button" class="w-35 py-2.5 px-5 me-2 mb-2 text-sm font-medium text-gray-900 flex items-center gap-2 justify-center focus:outline-none bg-gray-200 rounded-lg border border-gray-200 hover:bg-gray-100 hover:text-blue-700 focus:z-10 focus:ring-4 focus:ring-gray-100" (click)="goBack()"> 
                        <img width="17" height="17" src="https://img.icons8.com/ios/50/back--v1.png" alt="back icon"/> Back 
                    </button>
                    <button
        id="nextBtn"
        (click)="goNext()" [routerLink]="'/fequency'"

        class="w-35 py-2.5 px-5  me-2 mb-2 text-sm font-medium text-gray-900 flex items-center gap-2 justify-center focus:outline-none bg-[#5B8E7D] rounded-lg border border-gray-200 hover:bg-gray-100 hover:text-blue-700 focus:z-10 focus:ring-4 focus:ring-gray-100"
      > 
        Next <img width="17" height="17" src="https://img.icons8.com/?size=100&id=61&format=png&color=000000" alt="back icon"/>
      </button>
                </div>
            </form>
        </div>
    </div>
</body>
