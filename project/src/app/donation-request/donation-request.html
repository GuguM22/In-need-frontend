<app-navbar></app-navbar>

<body class="min-h-screen overflow-y-auto bg-white flex flex-col pb-20 ">
    <div> 
        <!-- <div class="flex items-center justify-center space-x-9 mt-8" id="stepper">
            <div class="step w-11 h-11 flex items-center justify-center rounded-full bg-blue-500 text-white text-sm">1</div> 
            <div class="step w-11 h-11 flex items-center justify-center rounded-full bg-blue-500 text-white text-sm">2</div> 
            <div class="step w-11 h-11 flex items-center justify-center rounded-full bg-gray-200 text-gray-500 text-sm">3</div> 
            <div class="step w-11 h-11 flex items-center justify-center rounded-full bg-gray-200 text-gray-500 text-sm">4</div> 
        </div> -->
        <div class="flex items-center justify-center space-x-4 mb-6" id="stepper">
          <div
            class="step w-10 h-10 flex items-center justify-center rounded-full bg-blue-500 text-white font-[800]"
          >
            1
          </div>
          <div
            class="step w-10 h-10 flex items-center justify-center rounded-full bg-blue-500 text-white font-[800]"
          >
            2
          </div>
          <div
            class="step w-10 h-10 flex items-center justify-center rounded-full bg-[#00000040] text-[#FFFFFF] font-[800]"
          >
            3
          </div>
          <div
            class="step w-10 h-10 flex items-center justify-center rounded-full bg-[#00000040] text-white font-[800]"
          >
            4
          </div>
        </div>

        <div class="w-full max-w-sm relative mb-2">
            <div class="absolute -left-3 -top-10 flex items-center space-x-2">
             
             
            </div>
        </div>

        <div class="text-gray-800 text-base font-bold mt-8 text-center text-xl">Details</div> 
        <div class="text-gray-500 text-sm font-[700] text-center mt-1">Tell us about your donation</div>

        <div class="mt-4 max-w-sm mx-auto p-6 bg-white border border-gray-300 rounded-lg boxx"> 
            <div class="text-gray-800 text-base font-bold text-[18px] mb-5 text-center">Donation Details</div>
            <form [formGroup]="sponsorshipForm" class="max-w-sm mx-auto border-gray-300"> 
                <!-- Description -->
                <div class="mb-4 text-gray-500"> 
                    <label for="description" class="block mb-2 text-sm font-medium">
                    Description: <span class="text-gray-500"><span class="text-red-500 text-md">*</span></span>
                    </label> 
                    <input 
                    type="text" 
                    id="description" 
                    formControlName="description" 
                    class="bg-white border border-gray-400 text-gray-700 text-sm rounded-lg w-full p-2.5 
                            focus:ring-blue-500 focus:border-blue-500"
                    /> 
                    <div class="text-red-500 text-xs mt-1" *ngIf="sponsorshipForm.get('description')?.touched && sponsorshipForm.get('description')?.invalid">
                    Description is required.
                    </div>
                </div>

                <!-- Quantity -->
                <div class="form-group mb-4">
                    <label for="quantity" class="form-label block mb-2 text-sm font-medium text-gray-500">
                    Quantity: <span class="text-gray-500"><span class="text-red-500 text-md">*</span></span>
                    </label>
                    <input 
                    type="number" 
                    id="quantity" 
                    formControlName="quantity" 
                    class="bg-white border border-gray-400 text-gray-700 text-sm rounded-lg w-full p-2.5 
                            focus:ring-blue-500 focus:border-blue-500"
                    min="1"
                    />
                    <div class="error-message text-red-500 text-xs mt-1" *ngIf="sponsorshipForm.get('quantity')?.hasError('min') && sponsorshipForm.get('quantity')?.touched">
                    Quantity must be at least 1.
                    </div>
                </div>

                <!-- Required Date -->
                

                <!-- Logistics -->
                <div class="mb-4 text-gray-500"> 
  <label class="block mb-2 text-sm font-medium">
    Logistic Preference: <span class="text-gray-500"><span class="text-red-500 text-md">*</span></span>
  </label> 

  <div class="flex flex-wrap gap-4 justify-center">
    <!-- Delivery -->
  
<label class="relative cursor-pointer"> 
  <input type="radio" formControlName="logistics" value="DROP OFF" class="peer hidden" /> 
  <div class="w-[125px] h-[85px] bg-white border border-gray-400 peer-checked:border-blue-500 border-2 rounded-lg flex flex-col items-center justify-center"> 
    <svg xmlns="https://img.icons8.com/material-outlined/24/truck.png" width="25" height="25" stroke="currentColor" class="text-gray-500 "> 
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
        d="M9 17h6M9 13h6M4 17h1a1 1 0 001-1V6a1 1 0 011-1h10a1 1 0 011 1v3h2l3 4v5a1 1 0 01-1 1h-1M4 17a2 2 0 104 0 2 2 0 00-4 0zm13 0a2 2 0 104 0 2 2 0 00-4 0z"/> 
    </svg> 
    <span class="text-sm text-gray-600 mt-1">Drop-Off</span> 
  </div> 
</label>


    <!-- Pick-up -->
    <label class="relative cursor-pointer"> 
     
      <div class="w-[125px] h-[85px] bg-white border border-gray-400 peer-checked:border-[#c1121f] rounded-lg flex flex-col items-center justify-center"> 
        <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" stroke="currentColor" class="text-gray-500 opacity-50"> 
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
            d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/> 
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
            d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/> 
        </svg> 
        <span class="text-sm text-gray-300 mt-1">Pick-up</span> 
      </div> 
    </label>
  </div>

  <div class="text-red-500 text-xs mt-1" *ngIf="sponsorshipForm.get('logistics')?.touched && sponsorshipForm.get('logistics')?.invalid">
    Please select a logistics option.
  </div>
</div>

<div class="form-group mb-4">
  <label for="requiredDate" class="form-label block mb-2 text-sm font-medium text-gray-500">
  Delivered By Date: <span class="text-gray-500"><span class="text-red-500 text-md">*</span></span>
  </label>
  <input 
  type="date" 
  id="requiredDate" 
  formControlName="requiredDate" 
  class="bg-white border border-gray-400 text-gray-700 text-sm rounded-lg w-full p-2.5 
          focus:ring-blue-500 focus:border-blue-500"
  />
  <div class="error-message text-red-500 text-xs mt-1" *ngIf="sponsorshipForm.get('requiredDate')?.hasError('pastDate') && sponsorshipForm.get('requiredDate')?.touched">
  Date cannot be in the past.
  </div>
  <div
  *ngIf="sponsorshipForm.get('requiredDate')?.errors?.['afterRequiredDate'] && sponsorshipForm.get('requiredDate')?.touched"
  class="error text-red-500 text-xs mt-1"
>
Delivery date must not be after the organization's required date ({{ sponsorRequestRequiredDate | date: 'longDate' }}).
</div>

  
</div>
                <!-- Notes -->
                <div class="form-group mb-4 text-gray-500">
                    <label for="notes" class="block mb-2 text-sm font-medium">Additional Notes <span class="text-red-500 text-md">*</span></label>
                    <textarea 
                    id="notes" 
                    formControlName="notes" 
                    class="bg-white border border-gray-400 text-gray-700 text-sm rounded-lg w-full p-2.5 focus:ring-blue-500 focus:border-blue-500" 
                    rows="1">
                    </textarea>
                </div>

                <!-- Buttons -->
                <div class="flex flex-wrap gap-4 justify-center"> 
                    <button type="button"[routerLink]="['/options', requestId]" class="w-35 px-6 py-2 font-[800] me-2 mb-2 text-sm font-medium text-gray-900 flex items-center gap-2 justify-center focus:outline-none bg-[#D9D9D9] rounded-lg border border-gray-200 hover:bg-[#c8c8c8] focus:z-10 focus:ring-4 focus:ring-gray-100"> 
                      &lt; Back 
                    </button>


                    <button
                    type="button"
                    id="nextBtn"
                    (click)="goNext()" 
                    class="w-35 px-6 py-2 me-2 mb-2 text-sm font-[800] text-white font-medium text-gray-900 flex items-center gap-2 justify-center focus:outline-none bg-[#5B8E7D] rounded-lg border border-gray-200 hover:bg-[#4b8170] focus:z-10 focus:ring-4 focus:ring-gray-100"
                    > 
                    Next &gt; 
                    </button>
                </div>
                </form>
        </div>
    </div>
</body>
  <app-footer></app-footer>
