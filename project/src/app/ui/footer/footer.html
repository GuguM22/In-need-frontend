<div class="fixed bottom-0 left-0 z-50 w-full h-20 bg-white border-t border-gray-200">
  <div class="grid h-full max-w-lg grid-cols-4 bg-white mx-auto font-medium">

    <!-- Home Button -->
    <button type="button" [routerLink]="dashboardRoute"
      class="inline-flex flex-col items-center justify-center px-5 group">
      <svg xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" width="30" height="30" viewBox="0 0 50 50">
        <path
          d="M 24.962891 1.0546875 A 1.0001 1.0001 0 0 0 24.384766 1.2636719 L 1.3847656 19.210938 A 1.0005659 1.0005659 0 0 0 2.6152344 20.789062 L 4 19.708984 L 4 46 A 1.0001 1.0001 0 0 0 5 47 L 18.832031 47 A 1.0001 1.0001 0 0 0 19.158203 47 L 30.832031 47 A 1.0001 1.0001 0 0 0 31.158203 47 L 45 47 A 1.0001 1.0001 0 0 0 46 46 L 46 19.708984 L 47.384766 20.789062 A 1.0005657 1.0005657 0 1 0 48.615234 19.210938 L 41 13.269531 L 41 6 L 35 6 L 35 8.5859375 L 25.615234 1.2636719 A 1.0001 1.0001 0 0 0 24.962891 1.0546875 z M 25 3.3222656 L 44 18.148438 L 44 45 L 32 45 L 32 26 L 18 26 L 18 45 L 6 45 L 6 18.148438 L 25 3.3222656 z M 37 8 L 39 8 L 39 11.708984 L 37 10.146484 L 37 8 z M 20 28 L 30 28 L 30 45 L 20 45 L 20 28 z">
        </path>
      </svg>
      <span class="text-sm text-gray-500 dark:text-gray-400 group-hover:text-blue-600 dark:group-hover:text-blue-500"
      [ngClass]="{
        'text-blue-600 dark:text-blue-500 font-bold': isActive(dashboardRoute),
        'text-gray-500 dark:text-gray-400': !isActive(dashboardRoute)
      }"
      >Home</span>
    </button>

    <!-- Views Button -->
    <button type="button" class="inline-flex flex-col items-center justify-center px-5 group">
      <img width="30" height="30" src="https://img.icons8.com/ios/50/view-file.png" alt="view-file"/>
      <span class="text-sm text-gray-500 dark:text-gray-400 group-hover:text-blue-600 dark:group-hover:text-blue-500"
      [ngClass]="{
        'text-blue-600 dark:text-blue-500 font-bold': isViewRoute(),
        'text-gray-500 dark:text-gray-400': !isViewRoute()
      }"
      >Views</span>
    </button>

    <!-- Donation Button -->
    <button type="button"  [routerLink]="'/options'" class="inline-flex flex-col items-center justify-center px-5 group">
      <img width="30" height="30" src="https://img.icons8.com/ios/50/donate.png" alt="donate" />
      <span
        class="text-sm text-gray-500 dark:text-gray-400 group-hover:text-blue-600 dark:group-hover:text-blue-500"
        [ngClass]="{
          'text-blue-600 dark:text-blue-500 font-bold': isDonationRoute(),
          'text-gray-500 dark:text-gray-400': !isDonationRoute()
        }"
        >Donation</span>
    </button>

    <!-- Profile Button with routerLink -->
    <button 
      type="button" 
      [routerLink]="'/profile'" 
      class="inline-flex flex-col items-center justify-center px-5 group"
      [ngClass]="{
        'text-blue-600 dark:text-blue-500 font-bold': isActive('/profile'),
        'text-gray-500 dark:text-gray-400': !isActive('/profile')
      }"
      >
      <img width="30" height="30" src="https://img.icons8.com/ios/50/user-male-circle--v1.png" alt="user-male-circle--v1"/>
      <span class="text-sm text-gray-500 dark:text-gray-400 group-hover:text-blue-600 dark:group-hover:text-blue-500">
        Profile
      </span>
    </button>
  </div>
</div>
