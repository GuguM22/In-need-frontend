      [ngClass]="{'active': currentRoute.includes('/sponsor-activity') || currentRoute.includes('/sponsorship-request-page') || currentRoute.includes('/review-request')}"
      type="button" class="inline-flex flex-col items-center justify-center px-5 group">
      <img class="w-[22px] h-[22px]" src="icons/notifications.svg" alt="Notification" />
    </button>
