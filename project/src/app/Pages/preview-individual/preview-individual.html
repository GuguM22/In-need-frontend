
<div class="preview-card">
  <h3 class="preview-title">Live Preview</h3>

  <div class="preview-content">
    <!-- Header -->
    <div class="preview-header">
      <h4 class="preview-item-title">{{ formData?.title || 'Enter a title' }}</h4>
      <span class="preview-quantity">Qty: {{ formData?.quantity || 1 }}</span>
    </div>

    <!-- Description -->
    <div class="preview-body">
      <p class="preview-description">{{ formData?.description || 'Enter a description...' }}</p>

      <!-- Media Preview -->
      <div class="media-preview">
        <ng-container *ngFor="let preview of filePreviews">
          <img *ngIf="preview.endsWith('.png') || preview.endsWith('.jpg') || preview.endsWith('.jpeg')"
               [src]="preview"
               class="media-item" />

          <video *ngIf="preview.endsWith('.mp4')"
                 [src]="preview"
                 controls
                 class="media-item">
          </video>
        </ng-container>
      </div>

      <!-- Needed By Date -->
      <div class="preview-footer">
        Needed By: {{ formatDate(formData?.neededByDate) }}
      </div>
    </div>

    <!-- Update Button -->
    <div class="preview-actions">
      <button (click)="onUpdate()">Update</button>
    </div>
  </div>
</div>
