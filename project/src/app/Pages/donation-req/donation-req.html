<body>
  <div>
    <div class="flex items-center justify-center space-x-9 mt-8" id="stepper">
      <div class="step w-11 h-11 flex items-center justify-center rounded-full bg-blue-500 text-white text-sm">1</div>
      <div class="step w-11 h-11 flex items-center justify-center rounded-full bg-blue-500 text-white text-sm">2</div>
      <div class="step w-11 h-11 flex items-center justify-center rounded-full bg-gray-200 text-gray-500 text-sm">3</div>
      <div class="step w-11 h-11 flex items-center justify-center rounded-full bg-gray-200 text-gray-500 text-sm">4</div>
    </div>

    <div class="text-gray-800 text-base font-medium mt-12 text-center">Details</div>
    <div class="text-gray-500 text-sm font-medium text-center mt-1">Tell us about your donation</div>

    <div class="mt-4 max-w-sm mx-auto p-6 bg-white border-gray-300 rounded-lg">
    <form class="max-w-sm mx-auto ">

   
      <div class="mb-4 text-gray-500">
        <label for="description" class="block mb-2 text-sm font-medium">Description: <span class="text-gray-500">*</span></label>
        <input type="text" id="description" name="description"
          class="bg-gray-50 border border-gray-400 text-gray-700 text-sm rounded-lg w-full p-2.5 focus:ring-blue-500 focus:border-blue-500"
          required />
      </div>

  
      <div class="mb-4 text-gray-500">
        <label for="quantity" class="block mb-2 text-sm font-medium">Quantity: <span class="text-gray-500">*</span></label>
        <input type="number" id="quantity" name="quantity"
          class="bg-gray-50 border border-gray-400 text-gray-700 text-sm rounded-lg w-full p-2.5 focus:ring-blue-500 focus:border-blue-500"
          required />
      </div>

 
      <div class="mb-4 text-gray-500">
        <label for="availability" class="block mb-2 text-sm font-medium">Availability: <span class="text-gray-500">*</span></label>
        <input type="text" id="availability" name="availability"
          class="bg-gray-50 border border-gray-400 text-gray-700 text-sm rounded-lg w-full p-2.5 focus:ring-blue-500 focus:border-blue-500"
          required />
      </div>

  
      <div class="mb-4 text-gray-500">
  
<div class="mb-4 text-gray-500 justify-center ">
  <label class="block mb-2 text-sm font-medium">Logistic Preference: <span class="text-grey-500">*</span></label>
  <div class="flex flex-wrap gap-4 justify-center">





    <label class="relative cursor-pointer">
      <input type="radio" name="logistics" value="delivery" class="peer hidden" required />
      <div class="w-[125px] h-[85px] bg-white border border-gray-400 peer-checked:border-[#5B8E7D] rounded-lg flex flex-col items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="none" viewBox="0 0 24 24"
          stroke="currentColor" class="text-gray-500">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 17h6M9 13h6M4 17h1a1 1 0 001-1V6a1 1 0 011-1h10a1 1 0 011 1v3h2l3 4v5a1 1 0 01-1 1h-1M4 17a2 2 0 104 0 2 2 0 00-4 0zm13 0a2 2 0 104 0 2 2 0 00-4 0z" />
        </svg>
        <span class="text-sm text-gray-500 mt-1">Delivery</span>
      </div>
    </label>

  </div>

  
</div>

    <div class="mb-4 text-gray-500">
        <label for="availability" class="block mb-2 text-sm font-medium">Editional Notes: <span class="text-gray-500"></span></label>
        <input type="text" id="availability" name="availability"
          class="bg-gray-50 border border-gray-400 text-gray-700 text-sm rounded-lg w-full p-2.5 focus:ring-blue-500 focus:border-blue-500"
           />
      </div>
<div class="flex flex-wrap gap-4 justify-center">
  <button type="reset"
    class="w-35 py-2.5 px-5 me-2 mb-2 text-sm font-medium text-gray-900 flex items-center gap-2 justify-center focus:outline-none bg-gray-200 rounded-lg border border-gray-200 hover:bg-gray-100 hover:text-blue-700 focus:z-10 focus:ring-4 focus:ring-gray-100">
    <img width="17" height="17" src="https://img.icons8.com/ios/50/back--v1.png" alt="back icon"/>
    Back
  </button>

  <button type="submit"
    class="w-35 py-2.5 px-5 me-2 mb-2 text-sm font-medium text-white flex items-center gap-2 justify-center focus:outline-none rounded-lg border hover:opacity-90 transition duration-200"style="background-color: #5B8E7D; border-color: #5B8E7D;">
    Next
    <img width="17" height="17" src="https://img.icons8.com/ios/50/forward--v1.png" alt="next icon"/>
  </button>
</div>

 
  </div>

</form>
</div>
