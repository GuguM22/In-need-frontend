<body>
  <div class="mt-[100px] max-w-sm mx-auto p-6 bg-white border rounded-lg">
    <div class="text-gray-800 text-lg font-medium mb-4 text-center">Donation Details</div>

    <form class="max-w-sm mx-auto">

    
      <div class="mb-4 text-gray-500">
        <label for="description" class="block mb-2 text-sm font-medium">Description:</label>
        <input type="text" id="description"
          class="bg-gray-50 border border-gray-400 text-gray-700 text-sm rounded-lg w-full p-2.5 focus:ring-blue-500 focus:border-blue-500"
          required />
      </div>

      <div class="mb-4 text-gray-500">
        <label for="quantity" class="block mb-2 text-sm font-medium">Quantity:</label>
        <input type="number" id="quantity"
          class="bg-gray-50 border border-gray-400 text-gray-700 text-sm rounded-lg w-full p-2.5 focus:ring-blue-500 focus:border-blue-500"
          required />
      </div>

      <div class="mb-4 text-gray-500">
        <label for="availability" class="block mb-2 text-sm font-medium">Availability:</label>
        <input type="text" id="availability"
          class="bg-gray-50 border border-gray-400 text-gray-700 text-sm rounded-lg w-full p-2.5 focus:ring-blue-500 focus:border-blue-500"
          required />
      </div>

    
      <div class="mb-4 text-gray-500">
        <label class="block mb-2 text-sm font-medium">Logistic Preference:</label>
        <div class="flex flex-wrap gap-4 justify-center">
          <div class="w-[125px] h-[85px] bg-white border border-gray-400 rounded-lg flex flex-col items-center justify-center">
       
<svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="text-gray-500">
  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11.5a3 3 0 100-6 3 3 0 000 6z" />
  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3C8.134 3 5 6.134 5 10c0 5.25 7 11 7 11s7-5.75 7-11c0-3.866-3.134-7-7-7z" />
</svg>

            <h1 class="text-sm text-gray-500 mt-1">Pick-up</h1>
          </div>

          <div class="w-[125px] h-[85px] bg-white border border-gray-400 rounded-lg flex flex-col items-center justify-center">
            
             <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="text-gray-500">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17h6M9 13h6M4 17h1a1 1 0 001-1V6a1 1 0 011-1h10a1 1 0 011 1v3h2l3 4v5a1 1 0 01-1 1h-1M4 17a2 2 0 104 0 2 2 0 00-4 0zm13 0a2 2 0 104 0 2 2 0 00-4 0z" />
      </svg>
            <h1 class="text-sm text-gray-500 mt-1">Delivery</h1>
          </div>
        </div>
      </div>

      <div class="mb-4 text-gray-500">
        <label for="notes" class="block mb-2 text-sm font-medium">Additional Notes:</label>
        <input type="text" id="notes"
          class="bg-gray-50 border border-gray-400 text-gray-700 text-sm rounded-lg w-full p-2.5 focus:ring-blue-500 focus:border-blue-500"
          required />
      </div>

    </form>
  </div>
</body>
