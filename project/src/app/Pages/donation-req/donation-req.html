<body class="bg-pink min-h-screen">

  <div class="mt-[100px] max-w-sm mx-auto p-6 bg-white border  rounded-lg">
    <div class="text-black text-lg font-medium mb-4">Donation Details</div>

    <form class="max-w-sm mx-auto">

  
      <div class="mb-4">
        <label for="description" class="block mb-2 text-sm font-medium text-gray-600">Description:</label>
        <input type="text" id="description" class="bg-gray-50 border border-gray-400 text-gray-900 text-sm rounded-lg block w-full p-2.5 focus:ring-blue-500 focus:border-blue-500"  required />
      </div>

     
      <div class="mb-4">
        <label for="quantity" class="block mb-2 text-sm font-medium text-gray-600">Quantity:</label>
        <input type="number" id="quantity" class="bg-gray-50 border border-gray-400 text-gray-900 text-sm rounded-lg block w-full p-2.5 focus:ring-blue-500 focus:border-blue-500"  required />
      </div>

     
      <div class="mb-4">
        <label for="availability" class="block mb-2 text-sm font-medium text-gray-600">Availability:</label>
        <input type="text" id="availability" class="bg-gray-50 border border-gray-400 text-gray-900 text-sm rounded-lg block w-full p-2.5 focus:ring-blue-500 focus:border-blue-500" required />
      </div>

     
      <div class="mb-4">
        <label class="block mb-2 text-sm font-medium text-gray-600" required>Logistic Preference:</label>
        <div class="flex flex-wrap gap-4 justify-center">
          <div class="w-[125px] h-[85px] bg-white border border-gray-200 rounded-lg shadow-sm">

          </div>


          <div class="w-[125px] h-[85px] bg-white border border-gray-200 rounded-lg shadow-sm">
            <img src="assets/icons/my-icon.svg" alt="Icon" width="50" height="50">

          </div>
        </div>
      </div>

  
      <div class="mb-4">
        <label for="notes" class="block mb-2 text-sm font-medium text-gray-600">Additional Notes:</label>
        <input type="text" id="notes" class="bg-gray-50 border border-gray-400 text-gray-900 text-sm rounded-lg block w-full p-2.5 focus:ring-blue-500 focus:border-blue-500"  required/>
      </div>

    </form>
  </div>

</body>
