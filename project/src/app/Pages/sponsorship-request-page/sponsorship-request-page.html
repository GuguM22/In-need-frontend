
<div class="w-full h-screen overflow-x-hidden overflow-y-auto relative">
  <div class="min-h-screen flex flex-col items-center p-4 pt-16 pb-49">
    <!-- Back Button -->
    <div class="w-full max-w-sm relative mb-2">
      <div class="absolute -left-3 -top-10 flex items-center space-x-2">
        <svg
          width="24"
          height="24"
          viewBox="0 0 512 512"
          xmlns="http://www.w3.org/2000/svg"
        >
          <!-- Back arrow icon -->
          <path
            d="M50.2,169.6C97.9,56.3,228.5,3.1,341.8,50.9s166.4,178.3,118.7,291.6S282.2,508.9,168.9,461.1C86.4,426.4,32.7,345.5,32.7,256C32.7,226.3,38.6,196.9,50.2,169.6z M254.7,448c106,0,192-86,192-192s-86-192-192-192s-192,86-192,192S148.7,448,254.7,448z M226.7,140.7L111.4,256l115.3,115.3l21.2-21.2L168.7,271h208.2v-30H168.7l79.1-79.1L226.7,140.7z"
          />
        </svg>
        <button
          type="button"
          class="text-sm -left-py-3 text-black focus:outline-none"
        >
          Back
        </button>
      </div>
    </div>

    <div class="text-center mb-2">
      <h1 class="text-2xl font-bold text-black mb-1">
        My Sponsorship Requests
      </h1>
      <p class="text-sm text-black py-2">
        Manage your organisation's sponsorship requests
      </p>
    </div>

    <!-- Tabs Navigation -->
    <div class="border-b border-gray-200 w-full max-w-sm">
      <nav class="-mb-0.5 flex justify-center gap-x-6" role="tablist">
        <button
          (click)="activeTab = 'sponsor'"
          [ngClass]="{
          'font-semibold border-blue-600 text-blue-600': activeTab === 'sponsor',
          'text-black font-bold border-transparent': activeTab !== 'sponsor'
        }"
          class="w-full py-4 px-1 flex justify-center items-center gap-x-2 border-b-2 font-bold text-sm whitespace-nowrap"
        >
          Sponsor Request
        </button>

        <button
          (click)="activeTab = 'posts'"
          [ngClass]="{
          'font-semibold border-blue-600 text-blue-600': activeTab === 'posts',
          'text-black font-bold border-transparent': activeTab !== 'posts'
        }"
          class="w-full py-4 px-1 flex justify-center items-center gap-x-2 border-b-2 font-bold text-sm whitespace-nowrap"
        >
          Posts
        </button>
      </nav>
    </div>

    <!-- Tab Content -->
    <div class="w-full max-w-sm">
      <!-- Sponsor Request Tab Content -->
      @if (activeTab === 'sponsor') {
      <div class="mt-4">
        <div class="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
          <div class="mb-4">
            <p class="text-gray-500 text-sm">Sponsorship request for</p>
            <h2 class="text-lg font-bold text-gray-800">School Supplies</h2>
          </div>

          <div class="flex items-center mb-6">
            <div class="mr-3">
              <img class="h-10 w-10 rounded-full" src="logo.png" />
            </div>
            <div class="flex-grow">
              <h3 class="text-gray-800 font-medium">John Doe</h3>
              <p class="text-gray-500 text-sm">Sponsor</p>
            </div>
            <button
              type="button"
              [routerLink]="'/review-request'"
              class="py-2 px-4 bg-[#5B8E7D] text-sm text-white font-medium rounded-md"
            >
              View Request
            </button>
          </div>
        </div>
      </div>

      }
