<div class="min-h-screen bg-white flex flex-col items-center justify-center p-4">
<div class="flex items-center justify-center space-x-4 mb-4 relative">
    <!-- Back Button -->
    <div class="absolute left-0 mb-8 ml-[-5rem]">
        <button class="px-4 py-1 text-black rounded">Back</button>
    </div>
    
    <!-- Stepper -->
    <div class="flex items-center space-x-4" id="stepper">
        <div class="step w-8 h-8 flex items-center justify-center rounded-full bg-blue-500 text-white">1</div>
        <div class="step w-8 h-8 flex items-center justify-center rounded-full bg-blue-500 text-white">2</div>
        <div class="step w-8 h-8 flex items-center justify-center rounded-full bg-gray-200 text-gray-500">3</div>
        <div class="step w-8 h-8 flex items-center justify-center rounded-full bg-gray-200 text-gray-500">4</div>
    </div>
</div>
    <div class="step-panel w-full max-w-4xl" id="step-1">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-semibold">Details</h2>
            <p class="text-md text-gray-500">Tell us about your donations</p>
        </div>

        <div class="mt-8 p-8 bg-white border border-gray-300 rounded-lg shadow-xl">
            <div class="text-gray-800 text-xl font-medium mb-6 text-center">
                Donation Details
            </div>

            <form class="w-full">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-6">
                        <div class="text-gray-600">
                            <label for="description" class="block mb-3 text-sm font-medium">Description <span
                                    class="text-red-600">*</span></label>
                            <input type="text" id="description"
                                class="w-full p-2 text-sm bg-white border border-gray-600 rounded-md text-black placeholder-gray-400 focus:ring-1 focus:ring-gray-300 focus:border-gray-500 outline-none transition"
                                required />
                        </div>

                        <div class="text-gray-600">
                            <label for="quantity" class="block mb-3 text-sm font-medium">Quantity <span
                                    class="text-red-600 ">*</span></label>
                            <input type="number" id="quantity"
                                class="w-full p-2 text-sm bg-white border border-gray-600 rounded-md text-black placeholder-gray-400 focus:ring-1 focus:ring-gray-300 focus:border-gray-500 outline-none transition"
                                required />
                        </div>

                        <div class="text-gray-600">
                            <label for="availability" class="block mb-3 text-sm font-medium">Availability <span
                                    class="text-red-600">*</span></label>
                            <input type="text" id="availability"
                                class="w-full p-2 text-sm bg-white border border-gray-600 rounded-md text-black placeholder-gray-400 focus:ring-1 focus:ring-gray-300 focus:border-gray-500 outline-none transition"
                                required />
                        </div>
                    </div>

                    <!-- Right Column -->
                    <div class="space-y-6">
                        <div class="text-gray-600">
                            <label class="block mb-3 text-sm font-medium">Logistic Preference <span
                                    class="text-red-600">*</span></label>
                            <div class="flex gap-6">
                                <!-- Pick-up Option -->
                                <div
                                    class="w-full p-4 text-sm bg-white border border-gray-300 rounded-lg text-black hover:border-gray-600 hover:bg-gray-50 transition flex flex-col cursor-pointer relative">
                                    <div class="flex flex-col items-center justify-center">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none"
                                            viewBox="0 0 24 24" stroke="currentColor" class="text-gray-600">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M12 11.5a3 3 0 100-6 3 3 0 000 6z" />
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M12 3C8.134 3 5 6.134 5 10c0 5.25 7 11 7 11s7-5.75 7-11c0-3.866-3.134-7-7-7z" />
                                        </svg>
                                        <span class="text-sm text-gray-600 mt-2">Pick-up</span>
                                    </div>
                                    <input type="radio" name="pickup" value="item"
                                        class="absolute right-4 top-1/2 transform -translate-y-1/2 accent-gray-500"
                                        checked />
                                </div>

                                <!-- Delivery Option -->
                                <div
                                    class="w-full p-4 text-sm bg-white border border-gray-300 rounded-lg text-black hover:border-gray-600 hover:bg-gray-50 transition flex flex-col cursor-pointer relative">
                                    <div class="flex flex-col items-center justify-center">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none"
                                            viewBox="0 0 24 24" stroke="currentColor" class="text-gray-600">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M9 17h6M9 13h6M4 17h1a1 1 0 001-1V6a1 1 0 011-1h10a1 1 0 011 1v3h2l3 4v5a1 1 0 01-1 1h-1M4 17a2 2 0 104 0 2 2 0 00-4 0zm13 0a2 2 0 104 0 2 2 0 00-4 0z" />
                                        </svg>
                                        <span class="text-sm text-gray-600 mt-2">Delivery</span>
                                    </div>
                                    <input type="radio" name="pickup" value="delivery"
                                        class="absolute right-4 top-1/2 transform -translate-y-1/2 accent-gray-500" />
                                </div>
                            </div>
                        </div>

                        <div class="text-gray-600">
                            <label for="notes" class="block mb-3 text-sm font-medium">Additional Notes
                                (Optional)</label>
                            <textarea id="notes" rows="5"
                                class="w-full p-2 text-sm h-[150px] resize-none bg-white border border-gray-600 rounded-md text-black placeholder-gray-400 focus:ring-1 focus:ring-gray-300 focus:border-gray-500 outline-none transition"
                                required></textarea>
                        </div>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="flex justify-between items-center w-full mt-8">
                    <button id="backBtn" (click)="cancel()"
                        class="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                        &lt; Back
                    </button>
                    <button id="nextBtn" (click)="proceed()"
                        class="px-6 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 transition">
                        Next &gt;
                        <img width="50" height="50" src="https://img.icons8.com/ios/50/forward--v1.png" alt="forward--v1"/>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
