<app-navbar></app-navbar>

<div
  class=" bg-white flex flex-col  justify-center p-4 container"
>
<div class="top flex items-center space-x-2">
  <!-- Back arrow icon -->
  <svg
    xmlns="http://www.w3.org/2000/svg"
    class="w-5 h-5 text-black"
    fill="currentColor"
    viewBox="0 0 512 512"
  >
    <path
      d="M50.2,169.6C97.9,56.3,228.5,3.1,341.8,50.9s166.4,178.3,118.7,291.6S282.2,508.9,168.9,461.1C86.4,426.4,32.7,345.5,32.7,256C32.7,226.3,38.6,196.9,50.2,169.6z M254.7,448c106,0,192-86,192-192s-86-192-192-192s-192,86-192,192S148.7,448,254.7,448z M226.7,140.7L111.4,256l115.3,115.3l21.2-21.2L168.7,271h208.2v-30H168.7l79.1-79.1L226.7,140.7z"
    />
  </svg>

  <!-- Back button -->
  <button
    type="button"
    (click)="goBack()" [routerLink]="'/individual-dashboard'"
    class="text-sm font-bold text-black focus:outline-none"
  >
    Back
  </button>
</div>

  <!-- Stepper -->
  <!-- <div class="back">
    <h3>Back</h3>
  </div> -->
  
  <div class="flex items-center justify-center space-x-4 mb-6" id="stepper">
    <div
      class="step w-10 h-10 flex items-center justify-center rounded-full bg-blue-500 text-white font-[800]"
    >
      1
    </div>
    <div
      class="step w-10 h-10 flex items-center justify-center rounded-full bg-[#00000040] text-white font-[800]"
    >
      2
    </div>
    <div
      class="step w-10 h-10 flex items-center justify-center rounded-full bg-[#00000040] text-[#FFFFFF] font-[800]"
    >
      3
    </div>
    <div
      class="step w-10 h-10 flex items-center justify-center rounded-full bg-[#00000040] text-white font-[800]"
    >
      4
    </div>
  </div>
  <div class="step-panel" id="step-1">
    <div class="text-center mb-4 mt-[10px]">
      <h2 class="text-xl font-[800]">Donation Type</h2>
      <p class="text-sm font-[700] text-gray-500">What would you like to donate?</p>
    </div>
  </div>
  <!-- Main Card -->
  <div
    class="max-w-md mx-auto p-6 bg-white rounded-lg border border-gray-300 shadow-xl"
  >
    <!-- Step 1 -->
    <div class="step-panel" id="step-1">
      <div class="text-center mb-4">
        <h2 class="text-xl font-[800] choose">Choose Your Donation Type</h2>
      </div>

      <!-- Step Content -->
      <form class="space-y-4">
        <!-- Food Donations -->
        <label
          class="block border rounded-xl p-4 flex items-center gap-4 cursor-pointer hover:shadow-md transition types"
        >
          <img
            src="https://i.pinimg.com/736x/cf/b1/aa/cfb1aa51b9d84c308f0ed811ff4d371e.jpg"
            alt="Food"
            class="w-10 h-10 rounded object-cover"
          />
          <div>
            <p class="font-medium heading">Food Donations</p>
            <p class="text-sm text-gray-500 desc">
              Fresh foods, groceries, or packaged food items
            </p>
          </div>
          <input
            type="radio"
            name="donationType"
            value="food"
            class="ml-auto mt-1 accent-blue-500"
          />
        </label>

        <!-- Item Donations -->
        <label
          class="block border rounded-xl p-4 flex items-center gap-4 cursor-pointer hover:shadow-md transition types"
        >
          <img
            src="https://i.pinimg.com/736x/86/0a/a0/860aa0fffb5c0f48b61574f355ec217e.jpg"
            alt="Items"
            class="w-10 h-10 rounded object-cover"
          />
          <div>
            <p class="font-medium heading">Item Donations</p>
            <p class="text-sm text-gray-500 desc">
              Clothing, household material, or personal items
            </p>
          </div>
          <input
            type="radio"
            name="donationType"
            value="item"
            class="ml-auto mt-1 accent-blue-500"
            [(ngModel)]  = "selectedType"
          />
        </label>

        <!-- Service Donations -->
        <label
          class="block border rounded-xl p-4 flex items-center gap-4 cursor-pointer hover:shadow-md transition types"
        >
          <img
            src="https://i.pinimg.com/1200x/33/27/f1/3327f18b64752e73e5bbdaa773a16c9c.jpg"
            alt="Service"
            class="w-11 h-11 rounded object-cover"
          />
          <div>
            <p class="font-medium heading">Service Donations</p>
            <p class="text-sm text-gray-500 desc">
              Offering skills, volunteering or helpful services
            </p>
          </div>
          <input
            type="radio"
            name="donationType"
            value="service"
            class="ml-auto mt-1 accent-blue-500"
          />
        </label>
      </form>
    </div>

    <!-- Step 2 -->
    <div class="step-panel hidden" id="step-2">
      <div class="text-center">
        <h2 class="text-xl font-semibold">Step 2</h2>
        <p class="text-sm text-gray-500">
          Describe your donation (placeholder)
        </p>
      </div>
    </div>

    <!-- Step 3 -->
    <div class="step-panel hidden" id="step-3">
      <div class="text-center">
        <h2 class="text-xl font-semibold">Step 3</h2>
        <p class="text-sm text-gray-500">Your Contact Details (placeholder)</p>
      </div>
    </div>

    <!-- Step 4 -->
    <div class="step-panel hidden" id="step-4">
      <div class="text-center">
        <h2 class="text-xl font-semibold">Step 4</h2>
        <p class="text-sm text-gray-500">Confirm and Submit (placeholder)</p>
      </div>
    </div>

    <!-- Buttons -->
    <div class="flex justify-between items-center w-full mt-8">
      <button
        id="backBtn"
        (click)="goBack()" [routerLink]="'/individual-dashboard'"
        class="px-6 py-2 bg-[#D9D9D9] text-gray-700 font-[800] rounded-lg hover:bg-gray-300 transition"
        
      >
        &lt; Back
      </button>
      <button
        id="nextBtn"
        (click)="goNext()" [routerLink]="'/req'"
        
        class="px-6 py-2 bg-[#5B8E7D] text-white font-[800] rounded-lg hover:bg-emerald-700 transition"
      >
        Next &gt;
      </button>
    </div>

    <!-- Error message -->
    <p id="stepError" class="text-red-600 text-sm mt-2 text-center hidden">
      Please complete the required fields before continuing.
    </p>
  </div>
</div>
<app-footer></app-footer>
