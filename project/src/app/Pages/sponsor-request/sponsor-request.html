<div class="nav sticky top-0 z-10">
<button class="back-btn" type="button" (click)="backButton()">
  <img width="20" height="20" src="https://img.icons8.com/ios/50/circled-left-2.png" alt="circled-left-2"/>
    Back
  </button>
  </div>
<div class="container">
  <div class="form-container" style="max-height: 100vh;">
    <div class="form-header">
     <div class="form-header">
  <h1 class="form-title text-align-center font-bold">Create Sponsorship Request</h1>
  <p class="form-subtitle text-align-center ">Fill out the details below to post your sponsorship request</p>
</div>

    <form class="sponsorship-form " [formGroup]="sponsorshipForm" (ngSubmit)="onSubmit() ">
     <label for="" class="form-label">Title</label>  
      <div class="form-group">

        <input 
          type="text" 
          id="title" 
          formControlName="title" 
          class="form-input" 
          placeholder="Enter a title"
          [class.error]="  sponsorshipForm.get('title')?.invalid && sponsorshipForm.get('title')?.touched">
      </div>

      <div class="form-group">
        <label for="priority" class="form-label">Priority</label>
        <div class="select-wrapper  ">
          <select id="priority" formControlName="priority" class="form-select">
            <option value="">Select priority</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
           
          </select>
          
          
        </div>
      </div>

      <div class="form-group">
        <label for="quantity" class="form-label">Quantity</label>
        <div class="number-input-wrapper">
          <input 
            type="number" 
            id="quantity" 
            formControlName="quantity" 
            class="form-input number-input" 
            min="1"
            [class.error]=" sponsorshipForm.get('quantity')?.invalid && sponsorshipForm.get('quantity')?.touched">
         
        </div>
      </div>

     <div class="form-group">
  <label for="date" class="form-label">Required By Date</label>
  <input 
    type="date" 
    id="date" 
    formControlName="requiredDate" 
    class="form-input date-input"
    [class.error]="sponsorshipForm.get('requiredDate')?.invalid && sponsorshipForm.get('requiredDate')?.touched"
  
  />
  <div class="error-message" *ngIf="sponsorshipForm.get('requiredDate')?.hasError('pastDate') && sponsorshipForm.get('requiredDate')?.touched"  style="color: red;">
    Date cannot be in the past.
  </div>
</div>



      <div class="form-group">
        <label for="description" class="form-label">Description *</label>
        <textarea 
          id="description" 
          formControlName="description" 
          class="form-textarea" 
          rows="4"
          [class.error]="sponsorshipForm.get('description')?.invalid && sponsorshipForm.get('description')?.touched"></textarea>
      </div>

    
<div class="flex flex-col gap-6"> 

  <div class="upload">
    <label for="">Images or Videos (Optional)</label>
    <p class="uploadP">Add photos or videos to help sponsors understand your request better</p>
  </div>

  <div
    class="flex items-center justify-center w-full drop"
    (drop)="onFileDrop($event)"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
  >
    <label
      for="dropzone-file"
      class="flex flex-col items-center justify-center w-full h-25 border-2 border-gray-300 border-dashed rounded-lg cursor-pointer bg-white dark:hover:bg-white-800 dark:bg-white-700 hover:bg-gray-100 dark:border-white-600 dark:hover:border-white-500 dark:hover:bg-white-600"
    >
      <div class="flex flex-col items-center justify-center pt-5 pb-6">
        <img width="25" height="25" src="https://img.icons8.com/ios/50/upload--v1.png" alt="upload--v1"/>
        <p class="mb-2 text-sm text-gray-500 dark:text-gray-400 upP">
          <span class="font-[#00000094] font-bold">Upload Media Files</span> 
        </p>
        <p class="dragP text-gray-500 dark:text-gray-400">
          Drag and drop your files here, or <span class="b">browse  </span>      </p>
      </div>
      <input
        id="dropzone-file"
        type="file"
        (change)="onFileSelect($event)"
        multiple
        accept="image/*,video/*"
        class="hidden"
      />
    </label>
  </div>

  <!-- Previews (Optional) -->
  <div *ngIf="selectedFiles?.length" class="grid grid-cols-3 gap-4 min-h-[8rem]">
  <div *ngFor="let preview of filePreviews; let i = index" class="relative">
    <img *ngIf="selectedFiles[i]?.type?.startsWith('image/')"
         [src]="preview"
         class="w-full h-32 object-cover rounded-lg border" />

    <video *ngIf="selectedFiles[i]?.type?.startsWith('video/')"
           [src]="preview"
           controls
           class="w-full h-32 object-cover rounded-lg border">
    </video>
  </div>
</div>
</div>
  

  <!-- Button (spaced automatically from previews/upload) -->
  <!-- <button
    type="submit"
    class="submit-btn"
    [disabled]="isSubmitting">
    {{ isSubmitting ? 'Submitting...' : 'Submit Request' }}
  </button>
</div> -->


  <!-- Submit Button (now spaced below previews) -->
  <button
    type="submit"
    class="submit-btn"
      style="margin-top: 1.5rem;"
    [disabled]="isSubmitting">
    {{ isSubmitting ? 'Submitting...' : 'Submit Request' }}
  </button>


</form>

   </div>
