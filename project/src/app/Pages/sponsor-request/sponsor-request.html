
 <!-- Back Button -->
  <button class="back-btn" type="button" (click)="onBack()">
    <svg class="back-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path d="M19 12H6m0 0l6-6m-6 6l6 6"/>
    </svg>
    Back
  </button>

  <!-- Form -->
  <div class="form-container">
    <div class="form-header">
      <h1 class="form-title">Create Sponsorship Request</h1>
      <p class="form-subtitle">Fill out the details below to post your sponsorship request</p>
    </div>

    <form class="sponsorship-form" [formGroup]="sponsorshipForm" (ngSubmit)="onSubmit()">
      Title 
      <div class="form-group">
     
        <input 
          type="text" 
          id="title" 
          formControlName="title" 
          class="form-input" 
          placeholder="Enter a title"
          [class.error]="sponsorshipForm.get('title')?.invalid && sponsorshipForm.get('title')?.touched">
      </div>

      <div class="form-group">
        <label for="priority" class="form-label">Priority</label>
        <div class="select-wrapper">
          <select id="priority" formControlName="priority" class="form-select">
            <option value="">Select priority</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
           
          </select>
          
        </div>
      </div>

      <!-- Quantity Field -->
      <div class="form-group">
        <label for="quantity" class="form-label">Quantity</label>
        <div class="number-input-wrapper">
          <input 
            type="number" 
            id="quantity" 
            formControlName="quantity" 
            class="form-input number-input" 
            min="1"
            [class.error]="sponsorshipForm.get('quantity')?.invalid && sponsorshipForm.get('quantity')?.touched">
          <div class="number-controls">
            <button type="button" class="number-btn number-up" (click)="onQuantityChange(true)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M18 15l-6-6-6 6"/>
              </svg>
            </button>
            <button type="button" class="number-btn number-down" (click)="onQuantityChange(false)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M6 9l6 6 6-6"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Required By Date Field -->
      <div class="form-group">
        <label for="date" class="form-label">Required By Date</label>
        <div class="date-input-wrapper">
          <input 
            type="date" 
            id="date" 
            formControlName="requiredDate" 
            class="form-input date-input"
            [class.error]="sponsorshipForm.get('requiredDate')?.invalid && sponsorshipForm.get('requiredDate')?.touched">
        </div>
      </div>

      <!-- Description Field -->
      <div class="form-group">
        <label for="description" class="form-label">Description *</label>
        <textarea 
          id="description" 
          formControlName="description" 
          class="form-textarea" 
          rows="4"
          [class.error]="sponsorshipForm.get('description')?.invalid && sponsorshipForm.get('description')?.touched"></textarea>
      </div>

     <!-- File Upload Section -->
<div class="form-group">
  <label class="form-label">Images or Videos (Optional)</label>
  <p class="upload-help">Add photos or videos to help sponsors understand your request better</p>

  <div
    class="flex items-center justify-center w-full"
    (drop)="onFileDrop($event)"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
  >
    <label
      for="dropzone-file"
      class="flex flex-col items-center justify-center w-full h-64 border-2 border-gray-300 border-dashed rounded-lg cursor-pointer bg-gray-50 dark:hover:bg-gray-800 dark:bg-gray-700 hover:bg-gray-100 dark:border-gray-600 dark:hover:border-gray-500 dark:hover:bg-gray-600"
    >
      <div class="flex flex-col items-center justify-center pt-5 pb-6">
        <svg
          class="w-8 h-8 mb-4 text-gray-500 dark:text-gray-400"
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 20 16"
        >
          <path
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M13 13h3a3 3 0 0 0 0-6h-.025A5.56 5.56 0 0 0 16 6.5 5.5 5.5 0 0 0 5.207 5.021C5.137 5.017 5.071 5 5 5a4 4 0 0 0 0 8h2.167M10 15V6m0 0L8 8m2-2 2 2"
          />
        </svg>
        <p class="mb-2 text-sm text-gray-500 dark:text-gray-400">
          <span class="font-semibold">Click to upload</span> or drag and drop
        </p>
        <p class="text-xs text-gray-500 dark:text-gray-400">
          SVG, PNG, JPG, GIF or MP4 (MAX. 800x400px)
        </p>
      </div>
      <input
        id="dropzone-file"
        type="file"
        (change)="onFileSelect($event)"
        multiple
        accept="image/*,video/*"
        class="hidden"
      />
    </label>
  </div>

  
</div>

      <!-- Submit Button -->
      <button 
        type="submit" 
        class="submit-btn"
        [disabled]="isSubmitting">
        {{ isSubmitting ? 'Submitting...' : 'Submit Request' }}
      </button>
    </form>
  </div>
