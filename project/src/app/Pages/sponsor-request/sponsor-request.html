<app-navbar></app-navbar>
 
<app-toast
  [message]="toastMessage"
  [type]="toastType"
  [show]="showToast">
</app-toast>


<div class="flex flex-col justify-center min-h-screen box">
   <div class="text-center mt-[50px]">
      <h1 class="form-title text-center  mt-[50px] font-bold ">Requests</h1>
      
      <p class="form-subtitle text-center">Fill out the details below to post your sponsorship request</p>
    </div>

<div class="container">
   <div class="form-container ">
      <h1 class="form-title text-center font-bold">Create Sponsorship Request</h1>
      <form *ngIf="!showPreview" [formGroup]="sponsorshipForm" (ngSubmit)="onSubmit()" >

      <!-- Title -->
      <div class="form-group">
        <label class="form-label" for="title">Title</label>
        <input type="text" id="title" formControlName="title" class="form-input"
          placeholder="Enter a title"
          [class.error]="sponsorshipForm.get('title')?.invalid && sponsorshipForm.get('title')?.touched"/>
      </div>

      <!-- Priority -->
      <div class="form-group">
        <label class="form-label" for="priority">Priority</label>
        <select id="priority" formControlName="priority" class="form-select">
          <option value="">Select priority</option>
          <option value="Low">Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
        </select>
      </div>

      <!-- Quantity -->
      <div class="form-group">
        <label class="form-label" for="quantity">Quantity</label>
        <input type="number" id="quantity" formControlName="quantity" class="form-input" min="1"
          [class.error]="sponsorshipForm.get('quantity')?.invalid && sponsorshipForm.get('quantity')?.touched"/>
      </div>

      <!-- Required Date -->
      <div class="form-group">
        <label class="form-label" for="date">Required By Date</label>
        <input type="date" id="date" formControlName="requiredDate" class="form-input"
          [class.error]="sponsorshipForm.get('requiredDate')?.invalid && sponsorshipForm.get('requiredDate')?.touched"/>
        <div class="error-message" *ngIf="sponsorshipForm.get('requiredDate')?.hasError('pastDate') && sponsorshipForm.get('requiredDate')?.touched" style="color:red;">
          Date cannot be in the past.
        </div>
      </div>

      <!-- Location -->
      <div class="form-group">
        <label class="form-label" for="location">Location *</label>
        <input type="text" id="location" formControlName="location" class="form-input"
          placeholder="Enter the location of your organization"
          [class.error]="sponsorshipForm.get('location')?.invalid && sponsorshipForm.get('location')?.touched" />
      </div>

      <!-- Description -->
      <div class="form-group">
        <label class="form-label" for="description">Description *</label>
        <textarea id="description" formControlName="description" rows="4"
          class="form-textarea"
          [class.error]="sponsorshipForm.get('description')?.invalid && sponsorshipForm.get('description')?.touched"></textarea>
      </div>

      <!-- File Upload -->
      <div class="flex flex-col gap-6">
        <label>Images or Videos (Optional)</label>
        <p class="uploadP">Add photos or videos to help sponsors understand your request better</p>

        <div class="dropzone flex items-center justify-center w-full"
             (drop)="onFileDrop($event)"
             (dragover)="onDragOver($event)"
             (dragleave)="onDragLeave($event)">
          <label class="flex flex-col items-center justify-center cursor-pointer w-full h-25 border-2 border-dashed rounded-lg"
                 for="dropzone-file">
            <div class="flex flex-col items-center justify-center pt-5 pb-6">
              <img src="https://img.icons8.com/ios/50/upload--v1.png" width="25" height="25"/>
              <p class="mb-2 text-sm text-gray-500"><b>Upload Media Files</b></p>
              <p class="text-gray-500">Drag & drop files here or <span class="b">browse</span></p>
            </div>
            <input id="dropzone-file" type="file" (change)="onFileSelect($event)" multiple accept="image/*,video/*" class="hidden"/>
          </label>
        </div>

        

       <div *ngIf="selectedFiles?.length">
          <h4>Uploaded Files:</h4>
          <ul style="margin: 0; padding-left: 1rem;">
            <li *ngFor="let file of selectedFiles">
              {{ file.name.length > 30 ? (file.name | slice:0:27) + '...' : file.name }}
            </li>
          </ul>
        </div>

      <div class="flex gap-4">
          <button type="submit" class="submit-btn" [disabled]="isSubmitting">
            {{ isSubmitting ? 'Submitting...' : 'Submit Request' }}
          </button>
        </div>
      </div> <!-- end of file upload + button container -->
      </form>


    <app-preview-sponsor
      *ngIf="showPreview"
      [formData]="previewData"
      [filePreviews]="filePreviews"
      (updateClicked)="onEdit()">
    </app-preview-sponsor>

  </div>
</div>
</div>
