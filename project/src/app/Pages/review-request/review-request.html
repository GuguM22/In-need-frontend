<body class="bg-white min-h-screen flex items-start justify-center">
  <div class="max-w-sm w-full mx-auto mt-0 mb-0">
    
    <button class="flex items-center text-sm text-black mb-6 mt-0">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
      Back
    </button>

    <div class="bg-white w-80 border border-gray-300 rounded-lg p-6 min-h-[500px] space-y-6">
      <h2 class="text-center text-lg font-semibold">Review request</h2>

      <div class="text-sm text-gray-800 space-y-7">
        <div><span class="font-semibold">Type:</span> Items</div>
        <div><span class="font-semibold">Description:</span> this is two t-shirts and a white blazer</div>
        <div><span class="font-semibold">Quantity:</span> 2 items</div>
        <div><span class="font-semibold">Frequency:</span> One-time</div>
        <div><span class="font-semibold">Logistics:</span> Delivery</div>
      </div>

      <div class="flex justify-center gap-4">
        <button type="submit" class="h-8 px-1 text-xs w-35 text-white  justify-center focus:outline-none rounded-lg border hover:opacity-90 transition duration-200" style="background-color: #5B8E7D; border-color: #5B8E7D;">
          Accept Donation
        </button>
        <button type="submit" class="h-8 px-1 text-xs w-35 text-white  justify-center bg-red-600 rounded-lg border hover:opacity-90 transition duration-200" style="background-color: #C1121F; border-color: #C1121F;">
          Decline Donation
        </button>
      </div>

      <div class="pt-4 space-y-2">
        <p class="font-semibold text-black">Sponsored By</p>
        <div class="flex items-center space-x-2">
          <img src="https://via.placeholder.com/32" alt="Sponsor" class="w-8 h-8 rounded-full">
          <div>
            <p class="text-sm font-medium">Jacky Selebe</p>
            <p class="text-xs text-gray-500">Sponsor</p>
          </div>
        </div>
      </div>
      
    </div>
  </div>
</body>
